 <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

  <header class="header">
    <div class="logo-texto">
      <h1>DISTRIBUIDORA</h1>
      <h2>AYMARA</h2>
    </div>

    <div class="titulo-bienvenida">
      <h3>Contacto</h3>
    </div>

    <div class="header-derecha">
      <nav class="nav">
        <a href="index.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="contacto.html">Contacto</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="contacto-seccion">
      <div class="contacto-card">

        <div class="contacto-info">
          <h2>Contacto</h2>

          <div class="datos-contacto">
            <a href="https://wa.me/5493517677205" target="_blank" class="item-contacto">
              <i class="fa-brands fa-whatsapp"></i>
              <span>3517677205</span>
            </a>

            <a href="tel:+543517677205" class="item-contacto">
              <i class="fa-solid fa-phone"></i>
              <span>3517677205</span>
            </a>

            <a href="mailto:aymaradistribuidora@gmail.com" class="item-contacto">
              <i class="fa-solid fa-envelope"></i>
              <span>aymaradistribuidora@gmail.com</span>
            </a>

            <a href="https://www.google.com/maps/search/Arg%C3%BCello+C%C3%B3rdoba" target="_blank" class="item-contacto">
              <i class="fa-solid fa-location-dot"></i>
              <span>Argüello - Córdoba</span>
            </a>
          </div>
        </div>

        <div class="formulario-contenedor">
          <form class="formulario-contacto">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre">

            <label for="correo">Email</label>
            <input type="email" id="correo" name="correo" placeholder="Tu email">

            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" name="telefono" placeholder="Tu teléfono">

            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" name="mensaje" rows="6" placeholder="Escribí tu mensaje"></textarea>

            <button type="submit">Enviar</button>
          </form>
        </div>

      </div>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 Distribuidora Aymara</p>
  </footer>

</body>

</html>
